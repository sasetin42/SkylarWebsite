<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Skylar Education Asia Inc.: Premier provider of GWO, High Risk Work, and Industrial Safety training in the Philippines. Expanded from Skylar Education Pty Ltd (Australia)." />
    <meta name="theme-color" content="#041024" />
    <title>Skylar Education Asia Inc. | Industrial Safety & GWO Training</title>
    <link rel="icon" type="image/svg+xml" href="/skylar-logo.svg" />

    <!-- Performance Optimization: Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700;800&family=Roboto:wght@400;500;700&family=Open+Sans:wght@400;600;700&family=Lato:wght@400;700&family=Maven+Pro:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet">

    <style id="theme-root">
      :root {
        --color-primary: #041024;
        --color-secondary: #041024;
        --color-accent: #F59E0B;
        --color-surface: #F8FAFC;
        --font-sans: 'Maven Pro', sans-serif;
        --font-heading: 'Maven Pro', sans-serif;
        --radius-base: 0.75rem;
        /* 12px / xl */
        --font-size-base: 15px;
      }

      html {
        font-size: var(--font-size-base);
      }

      body {
        font-family: var(--font-sans);
        background-color: var(--color-surface);
        overflow-x: hidden;
        color: #1e293b;
        /* slate-800 */
      }

      .dark body {
        background-color: var(--color-secondary);
        color: #f1f5f9;
        /* slate-100 */
      }

      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        font-family: var(--font-heading);
        letter-spacing: -0.025em;
      }

      /* Premium Shadow & Glass Effects */
      .premium-shadow {
        box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      }

      .glass-effect {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.3);
      }

      .dark .glass-effect {
        background: rgba(15, 23, 42, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      /* Dynamic Border Radius Utility */
      .rounded-xl {
        border-radius: var(--radius-base) !important;
      }

      .rounded-2xl {
        border-radius: calc(var(--radius-base) + 0.25rem) !important;
      }

      .rounded-3xl {
        border-radius: calc(var(--radius-base) + 0.75rem) !important;
      }

      /* Accessibility: Skip to content */
      .skip-link {
        position: absolute;
        top: -40px;
        left: 0;
        background: var(--color-accent);
        color: var(--color-secondary);
        padding: 8px;
        z-index: 100;
        font-weight: bold;
        transition: top 0.3s;
      }

      .skip-link:focus {
        top: 0;
      }
    </style>

    <script>
      // Early theme detection to prevent flicker
      (function () {
        const theme = localStorage.getItem('theme');
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
