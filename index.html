<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Skylar Education Asia Inc.: Premier provider of GWO, High Risk Work, and Industrial Safety training in the Philippines. Expanded from Skylar Education Pty Ltd (Australia)." />
    <meta name="theme-color" content="#1C3D72" />
    <title>Skylar Education Asia Inc. | Industrial Safety & GWO Training</title>

    <!-- Performance Optimization: Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700;800&family=Roboto:wght@400;500;700&family=Open+Sans:wght@400;600;700&family=Lato:wght@400;700&family=Maven+Pro:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet">

    <style id="theme-root">
      :root {
        --color-primary: #0C2340;
        --color-secondary: #051124;
        --color-accent: #F59E0B;
        --color-surface: #F8FAFC;
        --font-sans: 'Maven Pro', sans-serif;
        --font-heading: 'Maven Pro', sans-serif;
        --radius-base: 0.75rem;
        /* 12px / xl */
        --font-size-base: 16px;
      }

      html {
        font-size: var(--font-size-base);
      }

      body {
        font-family: var(--font-sans);
        background-color: var(--color-surface);
        overflow-x: hidden;
        color: #1e293b;
        /* slate-800 */
      }

      .dark body {
        background-color: var(--color-secondary);
        color: #f1f5f9;
        /* slate-100 */
      }

      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        font-family: var(--font-heading);
        letter-spacing: -0.025em;
      }

      /* Premium Shadow & Glass Effects */
      .premium-shadow {
        box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      }

      .glass-effect {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.3);
      }

      .dark .glass-effect {
        background: rgba(15, 23, 42, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      /* Dynamic Border Radius Utility */
      .rounded-xl {
        border-radius: var(--radius-base) !important;
      }

      .rounded-2xl {
        border-radius: calc(var(--radius-base) + 0.25rem) !important;
      }

      .rounded-3xl {
        border-radius: calc(var(--radius-base) + 0.75rem) !important;
      }

      /* Accessibility: Skip to content */
      .skip-link {
        position: absolute;
        top: -40px;
        left: 0;
        background: var(--color-accent);
        color: var(--color-secondary);
        padding: 8px;
        z-index: 100;
        font-weight: bold;
        transition: top 0.3s;
      }

      .skip-link:focus {
        top: 0;
      }
    </style>

    <script>
      // Early theme detection to prevent flicker
      (function () {
        const theme = localStorage.getItem('theme');
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: {
                DEFAULT: 'var(--color-primary)',
                50: '#f0f4f8',
                100: '#d9e2ec',
                200: '#bcccdc',
                300: '#9fb3c8',
                400: '#829ab1',
                500: '#627d98',
                600: '#486581',
                700: '#334e68',
                800: '#243b53',
                900: '#102a43',
              },
              secondary: 'var(--color-secondary)',
              accent: 'var(--color-accent)',
              surface: 'var(--color-surface)',
              info: '#0EA5E9',
              success: '#10B981',
              warning: '#F59E0B',
              error: '#EF4444',
              neutral: {
                50: '#F8FAFC',
                100: '#F1F5F9',
                200: '#E2E8F0',
                300: '#CBD5E1',
                400: '#94A3B8',
                500: '#64748B',
                600: '#475569',
                700: '#334155',
                800: '#1E293B',
                900: '#0F172A',
                950: '#020617',
              }
            },
            fontFamily: {
              sans: ['var(--font-sans)'],
              heading: ['var(--font-heading)'],
            },
            animation: {
              'fade-in': 'fadeIn 0.5s ease-in-out',
              'fade-in-up': 'fadeInUp 0.5s ease-out',
              'fade-in-down': 'fadeInDown 0.5s ease-out',
              'pop-in': 'popIn 0.6s cubic-bezier(0.16, 1, 0.3, 1)',
              'spin-slow': 'spin 8s linear infinite',
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              fadeInDown: {
                '0%': { opacity: '0', transform: 'translateY(-20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              popIn: {
                '0%': { opacity: '0', transform: 'scale(0.9) translateY(10px)' },
                '100%': { opacity: '1', transform: 'scale(1) translateY(0)' },
              },
            },
          }
        }
      }
    </script>
    <link rel="stylesheet" href="/index.css">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
